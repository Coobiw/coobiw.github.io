  <script>
    window.hbb = {
      defaultTheme: document.documentElement.dataset.wcThemeDefault,
      setDarkTheme: () => {
        document.documentElement.classList.add("dark");
        document.documentElement.style.colorScheme = "dark";
      },
      setLightTheme: () => {
        document.documentElement.classList.remove("dark");
        document.documentElement.style.colorScheme = "light";
      }
    };

    if ("wc-color-theme" in localStorage) {
      localStorage.getItem("wc-color-theme") === "dark" ? window.hbb.setDarkTheme() : window.hbb.setLightTheme();
    } else {
      window.hbb.defaultTheme === "dark" ? window.hbb.setDarkTheme() : window.hbb.setLightTheme();
      if (window.hbb.defaultTheme === "system") {
        window.matchMedia("(prefers-color-scheme: dark)").matches ? window.hbb.setDarkTheme() : window.hbb.setLightTheme();
      }
    }
  </script>
  <style>
    @font-face {
      font-family: 'Inter var';
      font-style: normal;
      font-weight: 100 900;
      font-display: swap;
      src: url(/dist/font/Inter.var.woff2) format(woff2);
    }

    :root {
      --page-bg-base: #060d18;
      --page-bg-surface: #0a1220;
      --page-bg-elevated: rgba(10, 18, 32, 0.9);

      --page-muted: rgba(203, 213, 225, 0.78);
      --page-faint: rgba(148, 163, 184, 0.62);

      --page-teal: #2dd4bf;
    }

    * {
      box-sizing: border-box;
    }

    body.page-wrapper {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(180deg, var(--page-bg-base) 0%, #08111f 42%, var(--page-bg-surface) 100%);
      color: var(--page-text);
      font-family: 'Inter var', Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #page-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(130deg, rgba(56, 189, 248, 0.08), transparent 34%),
        linear-gradient(240deg, rgba(45, 212, 191, 0.08), transparent 42%),
        linear-gradient(180deg, var(--page-bg-base) 0%, #08111f 42%, var(--page-bg-surface) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-header {
      padding: 0.6rem 0.9rem 0;
    }

    #site-header {
      width: min(100%, 1240px);
      margin: 0 auto;
      background: transparent !important;
      border: 0;
      box-shadow: none !important;
    }

    #site-header .navbar {
      min-height: 72px;
      align-items: center;
      padding: 0.85rem 1.1rem;
      border: 1px solid var(--page-border-subtle);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(8, 16, 29, 0.94), rgba(10, 18, 32, 0.88)),
        linear-gradient(180deg, rgba(56, 189, 248, 0.06), transparent 56%);
      box-shadow: 0 18px 48px rgba(2, 8, 23, 0.32);
      backdrop-filter: blur(18px);
    }

    #site-header .navbar-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      color: rgba(248, 250, 252, 0.96);
      font-weight: 700;
      letter-spacing: 0;
    }

    #site-header .navbar-brand img {
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(2, 8, 23, 0.32);
    }

    #site-header label[for="nav-toggle"] {
      margin-left: auto;
      padding: 0.5rem;
      border-radius: 14px;
      color: rgba(226, 232, 240, 0.88);
      transition: background-color 180ms ease, color 180ms ease;
    }

    #site-header label[for="nav-toggle"]:hover {
      background: rgba(59, 130, 246, 0.12);
      color: rgba(248, 250, 252, 0.98);
    }

    #nav-menu {
      align-items: center;
      margin-left: clamp(1rem, 4vw, 4rem);
    }

    #nav-toggle:checked ~ #nav-menu {
      display: flex;
    }

    #nav-toggle:checked + label #show-button {
      display: none;
    }

    #nav-toggle:checked + label #hide-button {
      display: block;
    }

    #nav-menu .nav-link {
      display: inline-flex;
      align-items: center;
      padding: 0.58rem 1rem;
      border: 1px solid transparent;
      border-radius: 9999px;
      color: rgba(226, 232, 240, 0.82);
      font-weight: 600;
      transition:
        color 180ms ease,
        background-color 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease;
    }

    #nav-menu .nav-link:hover {
      color: rgba(248, 250, 252, 0.98);
      background: rgba(59, 130, 246, 0.12);
      border-color: rgba(96, 165, 250, 0.18);
    }

    #nav-menu .nav-link.active {
      color: rgba(248, 250, 252, 1);
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.24), rgba(14, 165, 233, 0.18));
      border-color: rgba(96, 165, 250, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .page-body {
      min-height: calc(100vh - 4rem);
    }

    .shows-shell {
      width: min(calc(100% - 2rem), 1240px);
      margin: 0 auto;
      padding: clamp(1.2rem, 4vw, 2.4rem) 0 5rem;
    }

    .show-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
      gap: 1rem;
    }

    .show-card {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      min-height: 320px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 26px;
      background: var(--page-panel);
      box-shadow: 0 24px 60px rgba(2, 8, 23, 0.25);
      backdrop-filter: blur(12px);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .show-card:hover {
      transform: translateY(-2px);
      border-color: rgba(96, 165, 250, 0.26);
      box-shadow: 0 30px 70px rgba(2, 8, 23, 0.34);
    }

    .show-card-media {
      display: grid;
      min-width: 0;
      place-items: center;
      padding: 1rem;
      background: rgba(2, 6, 23, 0.46);
    }

    .show-card-media img {
      display: block;
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 18px 42px rgba(2, 8, 23, 0.34);
    }

    .show-preview-pair {
      display: grid;
      width: 100%;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
      align-items: center;
    }

    .show-preview-pair img {
      aspect-ratio: 4 / 3;
      height: auto;
      min-height: 0;
      background: #fff;
    }

    .show-card-body {
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: space-between;
      gap: 1rem;
      padding: clamp(1rem, 2.5vw, 1.6rem);
    }

    .show-card h2 {
      margin: 0;
      color: var(--page-text);
      font-size: clamp(1.35rem, 2vw, 1.8rem);
      font-weight: 850;
      line-height: 1.15;
    }

    .show-card p {
      margin: 0.85rem 0 0;
      color: var(--page-muted);
      line-height: 1.7;
    }

    .show-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--page-border-subtle);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--page-muted);
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .show-action {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 40px;
      padding: 0.6rem 0.85rem;
      border: 1px solid rgba(96, 165, 250, 0.28);
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.16);
      color: var(--page-text);
      font-weight: 800;
    }

    footer {
      width: min(100%, 1240px);
      margin: 0 auto;
      padding: 0 1rem 2rem;
      color: rgba(203, 213, 225, 0.72);
    }

    footer a {
      color: rgba(226, 232, 240, 0.9);
      text-decoration: underline;
      text-decoration-color: rgba(148, 163, 184, 0.45);
      text-underline-offset: 3px;
    }

    @media (max-width: 1023.98px) {
      .page-header {
        padding-left: 0.7rem;
        padding-right: 0.7rem;
      }

      #site-header .navbar {
        padding: 0.8rem 1rem;
      }

      #nav-menu {
        margin-top: 0.9rem;
        margin-left: 0;
        padding: 0.75rem;
        border: 1px solid var(--page-border-subtle);
        border-radius: 18px;
        background: var(--page-bg-elevated);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      #nav-menu .nav-item + .nav-item {
        margin-top: 0.35rem;
      }

      #nav-menu .nav-link {
        width: 100%;
        justify-content: flex-start;
      }

      .show-card {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shows-shell {
        width: min(calc(100% - 1.5rem), 1240px);
      }

      #site-header .navbar-brand {
        max-width: 210px;
        line-height: 1.25;
      }

      .show-card-media {
        padding: 0.75rem;
      }

      .show-card-media img {
        max-height: 220px;
      }

      .show-preview-pair {
        gap: 0.5rem;
      }

      .show-card-body {
        padding: 1rem;
      }
    }
  </style>
</head>
